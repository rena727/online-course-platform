<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş | EduMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #4e73df; --bg: #f4f7fe; }
        body { background: var(--bg); font-family: 'Poppins', sans-serif; height: 100vh; display: flex; align-items: center; }
        .auth-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; max-width: 900px; width: 100%; margin: auto; }
        .auth-info { background: linear-gradient(135deg, var(--primary), #224abe); color: white; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #e3e6f0; }
        .btn-auth { border-radius: 10px; padding: 12px; font-weight: 600; transition: 0.3s; }
        .role-selection .btn-check:checked + .btn-outline-primary { background-color: var(--primary); color: white; }
        .toggle-link { color: var(--primary); text-decoration: none; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="card auth-card shadow">
        <div class="row g-0">
            <div class="col-lg-5 auth-info text-center d-none d-lg-flex">
                <i class="fas fa-graduation-cap fa-4x mb-4"></i>
                <h2 class="fw-bold">Xoş Gəlmisiniz!</h2>
                <p class="opacity-75">EduMaster-ə qoşularaq öyrənməyə və ya biliklərinizi paylaşmağa başlayın.</p>
            </div>

            <div class="col-lg-7 bg-white p-5">
                <div id="login-form">
                    <h3 class="fw-bold mb-4">Daxil Ol</h3>
                    <div th:if="${param.error}" class="alert alert-danger small py-1">Email və ya şifrə səhvdir!</div>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Email ünvanı</label>
                            <input type="text" name="username" class="form-control" placeholder="nümunə@mail.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Şifrə</label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-auth w-100 mb-3 text-white">Giriş Et</button>
                    </form>
                    <p class="text-center small">Hesabınız yoxdur? <a th:href="@{/register}" class="toggle-link">Qeydiyyatdan keçin</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
