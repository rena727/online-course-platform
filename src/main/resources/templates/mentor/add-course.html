<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Yeni Kurs Yarat | BrainRise</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { background-color: #f4f6f9; font-family: 'Poppins', sans-serif; }
    .form-container { max-width: 900px; margin: 50px auto; }
    .form-card { background: #fff; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .section-title { font-size: 1.3rem; font-weight: 700; color: #0d6efd; margin-bottom: 25px; display: flex; align-items: center; }
    .section-title i { margin-right: 10px; }
    .form-label { font-weight: 600; }
    .form-control { border-radius: 10px; padding: 12px 15px; }
    .preview-icon { width: 100%; height: 200px; border: 2px dashed #dee2e6; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: #6c757d; font-size: 3rem; background-color: #f8f9fa; }
    .btn-primary { border-radius: 50px; font-weight: 700; padding: 15px; }
  </style>
</head>
<body>

<div class="container form-container">
  <div class="d-flex align-items-center mb-4">
    <a th:href="@{/mentor/dashboard}" class="btn btn-outline-secondary rounded-circle me-3"><i class="fas fa-arrow-left"></i></a>
    <div>
      <h2 class="fw-bold mb-0">Yeni Kurs Əlavə Et</h2>
    </div>
  </div>

  <div class="form-card">
    <form th:action="@{/mentor/course/create}" method="post">

      <div class="section-title"><i class="fas fa-info-circle"></i> Ümumi Məlumatlar</div>
      <div class="row g-3 mb-4">
        <div class="col-12">
          <label class="form-label">Kursun Adı</label>
          <input type="text" name="name" class="form-control" placeholder="Məsələn: Java Backend" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Qiymət (AZN)</label>
          <input type="number" name="price" class="form-control" placeholder="49" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Video URL (Tanıtım)</label>
          <input type="text" name="videoUrl" class="form-control" placeholder="https://youtube.com/...">
        </div>
      </div>

      <div class="section-title"><i class="fas fa-image"></i> Media və Ətraflı</div>
      <div class="row g-3 mb-3">
        <div class="col-md-7">
          <label class="form-label">Kurs haqqında ətraflı</label>
          <textarea name="description" class="form-control" rows="7" required></textarea>
        </div>
        <div class="col-md-5">
          <label class="form-label">Kursun Şəkil Linki (URL)</label>
          <input type="text" name="iconClass" id="iconInput" class="form-control mb-3"
                 placeholder="https://example.com/shekil.jpg">

          <div class="preview-icon" id="iconPreview" style="width: 100px; height: 100px; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; overflow: hidden;">
            <i class="fas fa-image text-muted" id="placeholderIcon"></i>
            <img id="previewImg" src="" style="display: none; width: 100%; height: 100%; object-fit: cover;">
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-4">TƏSDİQƏ GÖNDƏR</button>
    </form>
  </div>
</div>

<script>
  const iconInput = document.getElementById('iconInput');
  const iconPreview = document.getElementById('iconPreview');
  iconInput.addEventListener('input', function() {
      iconPreview.innerHTML = `<i class="${this.value}"></i>`;
  });
</script>

</body>
</html>
