<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Əlaqə | EduMaster</title></head>
<body>
<div layout:fragment="content" class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 glass-card p-4 shadow-sm border-0" style="border-radius: 20px; background: white;">
      <h3 class="fw-bold text-center text-primary mb-4">Bizə Yazın</h3>

      <div th:if="${param.success}" class="alert alert-success rounded-pill text-center">
        Mesajınız uğurla göndərildi!
      </div>

      <form th:action="@{/contact/send}" method="post">
        <div class="mb-3">
          <label class="form-label small fw-bold">Ad və Soyad</label>
          <input type="text" name="fullName" class="form-control rounded-pill px-3" placeholder="Adınız" required>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-bold">Email ünvanı</label>
          <input type="email" name="email" class="form-control rounded-pill px-3" placeholder="Email" required>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-bold">Mövzu</label>
          <select name="subject" class="form-select rounded-pill px-3">
            <option value="Kurs şikayəti">Kurs şikayəti</option>
            <option value="Texniki problem">Texniki problem</option>
            <option value="Təklif">Təklif</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-bold">Mesajınız</label>
          <textarea name="message" class="form-control" rows="4" style="border-radius: 15px;" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold shadow-sm">Göndər</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
