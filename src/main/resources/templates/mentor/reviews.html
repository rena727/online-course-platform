<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/mentor_layout :: layout(~{::content})}">
<head>
    <title>Gələn Rəylər | Mentor Panel</title>
    <style>
        .review-card { background: white; border-radius: 20px; border: 1px solid #f1f5f9; transition: 0.3s; margin-bottom: 1.5rem; }
        .review-card:hover { box-shadow: 0 10px 25px rgba(99, 102, 241, 0.1); }
        .user-avatar { width: 45px; height: 45px; background: #6366f1; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .course-tag { font-size: 0.75rem; background: #f1f5f9; color: #64748b; padding: 4px 12px; border-radius: 50px; font-weight: 600; }
        .reply-box { display: none; background: #f8fafc; border-radius: 15px; padding: 15px; margin-top: 15px; }
        .reply-box.active { display: block; }
    </style>
</head>
<body>

<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h2 class="fw-bold mb-1">Tələbə Rəyləri <i class="fas fa-star text-warning ms-2"></i></h2>
            <p class="text-muted">Bütün kurslarına gələn suallar və şərhlər bura toplanır.</p>
        </div>
        <div class="text-end">
            <span class="badge bg-primary rounded-pill px-3 py-2" th:text="${reviewsData.size() + ' Rəy'}">0 Rəy</span>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-10 mx-auto">

            <div th:if="${#lists.isEmpty(reviewsData)}" class="text-center py-5">
                <i class="fas fa-comment-slash fa-4x text-muted opacity-25 mb-3"></i>
                <h4 class="text-muted">Hələ ki, heç bir rəy gəlməyib.</h4>
            </div>

            <div th:each="item : ${reviewsData}" class="review-card p-4 shadow-sm" th:id="'review-' + ${item.comment.id}">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div class="d-flex align-items-center">
                        <div class="user-avatar me-3" th:text="${#strings.substring(item.comment.userName,0,1)}">U</div>
                        <div>
                            <h6 class="fw-bold mb-0" th:text="${item.comment.userName}">İstifadəçi Adı</h6>
                            <small class="text-muted" th:text="${#temporals.format(item.comment.createdAt, 'dd MMMM yyyy, HH:mm')}">Tarix</small>
                        </div>
                    </div>
                    <span class="course-tag">
                        <i class="fas fa-book me-1"></i> <span th:text="${item.courseName}">Kurs Adı</span>
                    </span>
                </div>

                <div class="ps-5 ms-2">
                    <p class="text-dark mb-3" th:text="${item.comment.text}">Tələbə rəyi...</p>

                    <div class="d-flex gap-3">
                        <button class="btn btn-sm btn-light rounded-pill px-3 fw-bold" th:onclick="'toggleReplyForm(' + ${item.comment.id} + ')'">
                            <i class="fas fa-reply me-1 text-primary"></i> Cavab Ver
                        </button>
                        <span class="small text-muted align-self-center">
                            <i class="fas fa-thumbs-up me-1 text-primary"></i> <span th:text="${item.comment.likes}">0</span>
                        </span>
                    </div>

                    <div class="mt-3 border-start ps-4" th:if="${!#lists.isEmpty(item.comment.replies)}">
                        <div th:each="reply : ${item.comment.replies}" class="mb-2 p-2 rounded bg-light border-bottom">
                            <small class="fw-bold d-block text-primary" th:text="${reply.userName}">Mentor</small>
                            <p class="small mb-0 text-muted" th:text="${reply.text}">Cavab...</p>
                        </div>
                    </div>

                    <div class="reply-box mt-3" th:id="'reply-form-' + ${item.comment.id}">
                        <form th:action="@{/courses/{cId}/comment/reply(cId=${item.courseId})}" method="post">
                            <input type="hidden" name="commentId" th:value="${item.comment.id}">
                            <textarea name="text" class="form-control border-0 bg-white mb-2" rows="2" placeholder="Tələbəyə cavabını yaz..."></textarea>
                            <div class="text-end">
                                <button type="button" class="btn btn-sm text-muted me-2" th:onclick="'toggleReplyForm(' + ${item.comment.id} + ')'">Ləğv et</button>
                                <button type="submit" class="btn btn-sm btn-primary rounded-pill px-4">Göndər</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    function toggleReplyForm(id) {
        const form = document.getElementById('reply-form-' + id);
        if (form) {
            form.classList.toggle('active');
            if(form.classList.contains('active')) {
                form.querySelector('textarea').focus();
            }
        }
    }

</script>

</body>
</html>
