<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/admin-layout}">
<head>
    <title>Video Təsdiqi | EduMaster OS</title>

    <style>
        .btn-video { background: #fee2e2; color: #ef4444; border: none; font-weight: 600; }
        .btn-video:hover { background: #fecaca; color: #dc2626; }
        .avatar-sm { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

<div layout:fragment="page-title">Moderasiya Paneli</div>

<div layout:fragment="content">

    <div class="glass-card">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr class="small text-muted">
                    <th>KURS VƏ MENTOR</th>
                    <th>QİYMƏT</th>
                    <th>VİDEO</th>
                    <th class="text-end">İDARƏETMƏ</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="course : ${pendingCourses}">

                    <!-- KURS + MENTOR -->
                    <td>
                        <div class="d-flex align-items-center">
                            <img class="avatar-sm me-2 border"
                                 th:src="${'https://ui-avatars.com/api/?name=' + (course.mentorName ?: 'Mentor')}">

                            <div>
                                <h6 class="small fw-bold mb-0" th:text="${course.name}">Kurs Adı</h6>
                                <small class="text-muted"
                                       th:text="${course.mentorName ?: 'Naməlum Mentor'}"></small>
                            </div>
                        </div>
                    </td>

                    <!-- QİYMƏT -->
                    <td>
                        <span class="badge bg-primary-subtle text-primary fw-bold"
                              th:text="${course.price} + ' ₼'">0 ₼</span>
                    </td>

                    <!-- VİDEO -->
                    <td>
                        <a th:href="${course.videoUrl}" target="_blank"
                           class="btn btn-sm btn-video rounded-pill px-3 shadow-sm">
                            <i class="fas fa-play me-1"></i> İzlə
                        </a>
                    </td>

                    <!-- İDARƏETMƏ -->
                    <td class="text-end">

                        <!-- APPROVE -->
                        <form th:action="@{/admin/course/approve/{id}(id=${course.id})}"
                              method="post" class="d-inline">
                            <button type="submit"
                                    class="btn btn-success btn-sm rounded-circle shadow-sm"
                                    title="Təsdiqlə">
                                <i class="fas fa-check"></i>
                            </button>
                        </form>

                        <!-- REJECT BUTTON -->
                        <button type="button"
                                class="btn btn-warning btn-sm rounded-circle shadow-sm ms-2"
                                data-bs-toggle="modal"
                                th:attr="data-bs-target='#rejectModal' + ${course.id}"
                                title="Rədd et">
                            <i class="fas fa-times text-white"></i>
                        </button>

                        <!-- DELETE -->
                        <form th:action="@{/admin/course/delete/{id}(id=${course.id})}"
                              method="post"
                              class="d-inline ms-2"
                              onsubmit="return confirm('Bu kursu silmək istədiyinizə əminsiniz?')">
                            <button type="submit"
                                    class="btn btn-danger btn-sm rounded-circle shadow-sm"
                                    title="Sil">
                                <i class="fas fa-trash"></i>
                            </button>
                        </form>

                        <!-- REJECT MODAL -->
                        <div class="modal fade"
                             th:id="'rejectModal' + ${course.id}"
                             tabindex="-1"
                             aria-hidden="true">

                            <div class="modal-dialog modal-dialog-centered">
                                <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">

                                    <form th:action="@{/admin/course/reject/{id}(id=${course.id})}"
                                          method="post">

                                        <div class="modal-header border-0">
                                            <h5 class="fw-bold">Kursu Rədd Et</h5>
                                            <button type="button"
                                                    class="btn-close"
                                                    data-bs-dismiss="modal"></button>
                                        </div>

                                        <div class="modal-body">
                                            <p class="text-muted small">
                                                Rədd etmə səbəbini yazın. Mentor bunu görəcək.
                                            </p>

                                            <textarea name="reason"
                                                      class="form-control"
                                                      rows="4"
                                                      required
                                                      placeholder="Məsələn: Video linki işləmir..."></textarea>
                                        </div>

                                        <div class="modal-footer border-0">
                                            <button type="button"
                                                    class="btn btn-light rounded-pill"
                                                    data-bs-dismiss="modal">
                                                Ləğv et
                                            </button>

                                            <button type="submit"
                                                    class="btn btn-danger rounded-pill fw-bold">
                                                Rədd et
                                            </button>
                                        </div>

                                    </form>
                                </div>
                            </div>
                        </div>

                    </td>
                </tr>

                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- BOOTSTRAP JS (BİR DƏFƏ OLMALIDIR!) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
