<!DOCTYPE html>
<html lang="az"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Blog Posts | BrainRise Insights</title>
    <style>
        .category-item { cursor: pointer; padding: 12px 16px; border-radius: 12px; transition: all 0.3s ease; background: white; margin-bottom: 8px; border: 1px solid #f1f1f1; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: #444; font-size: 0.95rem; }
        .category-item:hover { background: #f8f9ff; border-color: #0d6efd; color: #0d6efd; transform: translateX(5px); }
        .category-item.active { background: #0d6efd; color: white !important; border-color: #0d6efd; box-shadow: 0 4px 12px rgba(13, 110, 253, 0.2); font-weight: 600; }
        .blog-link { text-decoration: none; color: inherit; display: block; }
        .blog-card-wide { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; cursor: pointer; transition: 0.3s; border: 1px solid #eee; }
        .blog-card-wide:hover { box-shadow: 0 10px 30px rgba(0,0,0,0.08); transform: translateY(-3px); }
        .tag { background: #eef4ff; color: #0d6efd; padding: 4px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; }
        .blog-thumb { width: 100%; border-radius: 12px; height: 150px; object-fit: cover; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div layout:fragment="content">
    <div class="container my-5">
        <div class="row">
            <div class="col-lg-8" id="blog-list-container">
                <h2 class="fw-bold mb-5">Latest Posts</h2>

                <a th:href="@{/blog/{id}(id=${blog.id})}" class="blog-link" th:each="blog : ${blogs}" th:data-category="${blog.categoryName}">
                    <div class="blog-card-wide">
                        <div class="row align-items-center">
                            <div class="col-md-8">
                                <span class="tag mb-2 d-inline-block" th:text="${blog.categoryName != null ? blog.categoryName : 'General'}">Category</span>
                                <h3 class="fw-bold" th:text="${blog.title}">Title</h3>
                                <p class="text-muted" th:text="${blog.subTitle}">Subtitle...</p>
                                <div class="small text-muted">
                                    <i class="far fa-user me-1"></i> Admin • <i class="far fa-clock me-1"></i> 10 min read
                                </div>
                            </div>
                            <div class="col-md-4">
                                <img th:src="${blog.imageUrl}" class="blog-thumb" alt="Thumbnail">
                            </div>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-lg-4 ps-lg-5">
                <div th:replace="~{blog/sidebar :: sidebar(categories=${categories})}"></div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        document.querySelectorAll('.category-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                const activeItem = document.querySelector('.category-item.active');
                if(activeItem) activeItem.classList.remove('active');
                this.classList.add('active');

                const filter = this.getAttribute('data-filter');
                document.querySelectorAll('.blog-link').forEach(linkEl => {
                    const cat = linkEl.getAttribute('data-category');
                    if (filter === 'all' || cat === filter) {
                        linkEl.classList.remove('hidden');
                    } else {
                        linkEl.classList.add('hidden');
                    }
                });
            });
        });
    </script>
</div>
</body>
</html>
