
<div th:replace="~{layouts/mentor_layout :: layout(~{::section})}" xmlns:th="http://www.thymeleaf.org">
  <section>
    <div class="d-flex align-items-center mb-4">
      <a th:href="@{/mentor/courses}" class="btn btn-light rounded-circle me-3 shadow-sm">
        <i class="fas fa-arrow-left"></i>
      </a>
      <h2 class="fw-bold mb-0">Kursu Redaktə Et</h2>
    </div>

    <div class="card border-0 shadow-sm p-4 p-md-5" style="border-radius: 24px; background: white;">
      <form th:action="@{/mentor/course/update/{id}(id=${course.id})}" th:object="${course}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="row g-4">
          <div class="col-md-12">
            <label class="small fw-bold mb-2">Kursun Adı</label>
            <input type="text" th:field="*{name}" class="form-control py-2" style="border-radius: 12px;" required>
          </div>

          <div class="col-md-4">
            <label class="small fw-bold mb-2">Qiymət (AZN)</label>
            <div class="input-group">
              <input type="number" step="0.01" th:field="*{price}" class="form-control py-2" style="border-radius: 12px 0 0 12px;" required>
              <span class="input-group-text bg-light" style="border-radius: 0 12px 12px 0;">AZN</span>
            </div>
          </div>

          <div class="col-md-4">
            <label class="small fw-bold mb-2">İkon Klası (FontAwesome)</label>
            <div class="input-group">
              <span class="input-group-text bg-light" style="border-radius: 12px 0 0 12px;">
                <i th:class="*{iconClass != null ? iconClass : 'fas fa-book'}"></i>
              </span>
              <input type="text" th:field="*{iconClass}" class="form-control py-2" style="border-radius: 0 12px 12px 0;" placeholder="fas fa-laptop-code">
            </div>
          </div>

          <div class="col-md-4">
            <label class="small fw-bold mb-2">Video URL</label>
            <input type="text" th:field="*{videoUrl}" class="form-control py-2" style="border-radius: 12px;" placeholder="https://youtube.com/...">
          </div>

          <div class="col-12">
            <label class="small fw-bold mb-2">Təsvir</label>
            <textarea th:field="*{description}" class="form-control" style="border-radius: 12px;" rows="6" placeholder="Kurs haqqında ətraflı məlumat..."></textarea>
          </div>

          <div class="col-12 mt-4">
            <button type="submit" class="btn btn-indigo px-5 py-3 shadow-sm">
              <i class="fas fa-check-circle me-2"></i>DƏYİŞİKLİKLƏRİ TƏSDİQLƏ
            </button>
            <a th:href="@{/mentor/courses}" class="btn btn-link text-secondary text-decoration-none ms-3 fw-bold">İmtina et</a>
          </div>
        </div>
      </form>
    </div>
  </section>
</div>
