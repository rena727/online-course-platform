<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/admin-layout}">
<head>
  <title>Şikayətlər | EduMaster OS</title>
</head>
<body>

<div layout:fragment="page-title">Şikayət və Hesabatlar</div>

<div layout:fragment="content">
  <div class="glass-card">
    <h5 class="fw-bold mb-4 text-danger"><i class="fas fa-triangle-exclamation me-2"></i>Gələn Şikayətlər</h5>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light small">
        <tr>
          <th>GÖNDƏRƏN</th>
          <th>KURS/MÖVZU</th>
          <th>SƏBƏB</th>
          <th>TARİX</th>
          <th class="text-end">AKSİYA</th>
        </tr>
        </thead>
        <tbody>
        <tr>
          <td class="small fw-bold">Aysel M.</td>
          <td><a href="#" class="text-decoration-none small">Python Proqramlaşdırma</a></td>
          <td><span class="badge bg-warning-subtle text-warning border small" style="font-size: 10px;">Yanlış Məlumat</span></td>
          <td class="small text-muted">Dünən, 22:45</td>
          <td class="text-end">
            <button class="btn btn-sm btn-outline-dark rounded-pill px-3">Bax</button>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(reports)}">
          <td colspan="5" class="text-center py-5">
            <i class="fas fa-shield-check text-success fs-1 mb-3"></i>
            <p class="text-muted">Hazırda heç bir şikayət yoxdur.</p>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
