<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/admin-layout}">
<head>
  <title>Dashboard</title>
</head>
<body>

<div layout:fragment="page-title">Sistem Nəzarəti / Konsol</div>

<div layout:fragment="content">
  <div class="row g-4 mb-4">
    <div class="col-md-3">
      <div class="glass-card">
        <div class="d-flex justify-content-between">
          <div>
            <p class="text-muted small mb-1">Cəmi Tələbə</p>
            <h3 class="fw-bold mb-0">4,205</h3>
          </div>
          <div class="stat-icon bg-primary-subtle text-primary"
               style="width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center;">
            <i class="fas fa-users"></i>
          </div>
        </div>
        <div class="mt-2 small text-success"><i class="fas fa-arrow-up"></i> 12% bu ay</div>
      </div>
    </div>

  </div>

  <div class="row">
    <div class="col-lg-8">
      <div class="glass-card mb-4">
        <h6 class="fw-bold mb-4">Son Aktivlik</h6>
        <canvas id="activityChart" height="150"></canvas>
        <p class="text-muted small mt-3">Sistemin son 30 günlük performansı.</p>
      </div>
    </div>



<th:block layout:fragment="custom-scripts">
  <script>
    const ctx = document.getElementById('activityChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['B.E', 'Ç.A', 'Ç', 'C.A', 'C', 'Ş', 'B'],
            datasets: [{
                label: 'Baxış Sayı',
                data: [12, 19, 3, 5, 2, 3, 9],
                borderColor: '#3f83f8',
                tension: 0.4,
                fill: true,
                backgroundColor: 'rgba(63, 131, 248, 0.1)'
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true } }
        }
    });
  </script>
</th:block>

</body>
</html>
