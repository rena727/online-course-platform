<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{admin/admin-layout}">
<head>
  <title th:text="${blog.id != null ? 'Bloq Redaktə' : 'Yeni Bloq'}">Bloq Formu</title>
</head>
<body>

<div layout:fragment="page-title" th:text="${blog.id != null ? 'Bloq Redaktə' : 'Yeni Bloq'}"></div>

<div layout:fragment="content">
  <div class="glass-card mt-2 p-4">

    <form th:action="${blog.id != null} ? @{/admin/blog/update/{id}(id=${blog.id})} : @{/admin/blog/save}"
          th:object="${blog}" method="post">

      <div class="mb-3">
        <label class="form-label fw-semibold">Başlıq</label>
        <input type="text" th:field="*{title}" class="form-control" placeholder="Başlıq yazın" required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Alt Başlıq</label>
        <input type="text" th:field="*{subTitle}" class="form-control" placeholder="Qısa alt başlıq">
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Kateqoriya</label>
        <select th:field="*{categoryDto.id}" class="form-select">
          <option value="" disabled selected>Kateqoriya seçin</option>
          <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Mövzu Adı</label>
        <input type="text" th:field="*{topicName}" class="form-control" placeholder="Mövzu adı">
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Mövzu Açıqlama</label>
        <textarea th:field="*{topicDescription}" class="form-control" rows="5" placeholder="Mövzu haqqında açıqlama"></textarea>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Şəkil URL</label>
        <input type="url" th:field="*{imageUrl}" class="form-control" placeholder="https://example.com/photo.jpg">
      </div>

      <div class="d-flex align-items-center mt-4">
        <button type="submit" class="btn btn-primary px-5 me-3">
          <i class="fas fa-save me-2"></i> Yadda saxla
        </button>
        <a th:href="@{/admin/blog}" class="btn btn-link text-secondary">İmtina</a>
      </div>

    </form>
  </div>
</div>

</body>
</html>
