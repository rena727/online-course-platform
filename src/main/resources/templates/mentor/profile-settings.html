<div xmlns:th="http://www.thymeleaf.org"
     th:replace="~{layouts/mentor_layout :: layout(~{::section})}">

  <section class="container py-5">

    <!-- Header -->
    <div class="d-flex align-items-center mb-4">
      <a th:href="@{/mentor/dashboard}"
         class="btn btn-light rounded-circle me-3 shadow-sm">
        <i class="fas fa-arrow-left"></i>
      </a>
      <h2 class="fw-bold mb-0">Profil Məlumatlarını Yenilə</h2>
    </div>

    <!-- Success -->
    <div th:if="${param.success}" class="alert alert-success rounded-3 shadow-sm border-0 mb-4">
      <i class="fas fa-check-circle me-2"></i>
      Məlumatlar uğurla yeniləndi
    </div>

    <!-- Card -->
    <div class="card border-0 shadow-sm p-4 p-md-5" style="border-radius: 24px;">
      <form th:action="@{/mentor/profile/update}" th:object="${profile}" method="post">

        <div class="row g-4">

          <!-- Profil Şəkli -->
          <div class="col-12 text-center">
            <img th:src="*{imgUrl}" class="rounded-circle mb-3" style="width:120px;height:120px;object-fit:cover;"
                 onerror="this.src='https://via.placeholder.com/120';">
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Profil Şəkli (URL)</label>
            <input type="url" th:field="*{imgUrl}" class="form-control"
                   placeholder="https://example.com/photo.jpg">
          </div>

          <!-- Full name -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Ad Soyad</label>
            <input type="text" th:field="*{fullName}" class="form-control" required>
          </div>

          <!-- Specialty -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">İxtisas</label>
            <input type="text" th:field="*{specialty}" class="form-control" required>
          </div>

          <!-- Bio -->
          <div class="col-12">
            <label class="form-label fw-semibold">Haqqımda</label>
            <textarea th:field="*{bio}" class="form-control" rows="4"
                      placeholder="Qısa məlumat yaz..."></textarea>
          </div>

          <!-- LinkedIn -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">
              <i class="fab fa-linkedin text-primary me-1"></i> LinkedIn
            </label>
            <input type="url" th:field="*{linkedinUrl}" class="form-control" placeholder="https://linkedin.com/in/...">
          </div>

          <!-- GitHub -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">
              <i class="fab fa-github me-1"></i> GitHub
            </label>
            <input type="url" th:field="*{githubUrl}" class="form-control" placeholder="https://github.com/...">
          </div>

          <!-- Buttons -->
          <div class="col-12 mt-4 d-flex justify-content-start align-items-center gap-3">
            <button type="submit" class="btn btn-primary px-5 py-2">
              <i class="fas fa-save me-2"></i> Yadda saxla
            </button>
            <a th:href="@{/mentor/dashboard}" class="btn btn-outline-secondary px-4 py-2">
              İmtina
            </a>
          </div>


        </div>
      </form>
    </div>

  </section>

</div>
