<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloq Yazıları | EduMaster Insights</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; }
        .category-item { cursor: pointer; padding: 10px 15px; border-radius: 12px; transition: all 0.3s ease; background: white; margin-bottom: 8px; border: 1px solid transparent; display: flex; justify-content: space-between; align-items: center; }
        .category-item:hover { background: #eef4ff; transform: translateX(5px); color: #0d6efd; }
        .category-item.active { background: #0d6efd; color: white; font-weight: 600; }
        .blog-card-wide { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; cursor: pointer; transition: 0.3s; border: 1px solid #eee; }
        .blog-card-wide:hover { box-shadow: 0 10px 30px rgba(0,0,0,0.08); transform: translateY(-3px); }
        .tag { background: #eef4ff; color: #0d6efd; padding: 4px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; }
        .blog-thumb { width: 100%; border-radius: 12px; height: 150px; object-fit: cover; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-light bg-white py-3 border-bottom sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" th:href="@{/}">EDUMASTER <span class="text-dark">BLOG</span></a>
        <a th:href="@{/}" class="btn btn-outline-primary rounded-pill px-4">Ana Səhifə</a>
    </div>
</nav>

<div class="container my-5">
    <div class="row">
        <div class="col-lg-8" id="blog-list">
            <h2 class="fw-bold mb-5" id="current-category-title">Ən son yazılar</h2>

            <div class="blog-card-wide" th:each="blog : ${blogs}"
                 th:data-category="${blog.kategoriya}"
                 th:onclick="'openFullArticle(' + ${blog.id} + ')'">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <span class="tag mb-2 d-inline-block" th:text="${blog.kategoriya}">Backend</span>
                        <h3 class="fw-bold" th:text="${blog.title}">Başlıq</h3>
                        <p class="text-muted" th:text="${blog.subTitle}">Qısa məzmun...</p>
                        <div class="small text-muted">
                            <i class="far fa-user me-1"></i> Admin • <i class="far fa-clock me-1"></i> 10 dəq oxu
                        </div>
                    </div>
                    <div class="col-md-4">
                        <img th:src="${blog.imageUrl}" class="blog-thumb">
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4 ps-lg-5">
            <div class="p-4 bg-white border rounded-4 shadow-sm">
                <h5 class="fw-bold mb-4"><i class="fas fa-th-large me-2"></i>Kateqoriyalar</h5>
                <div id="category-filters">
                    <div class="category-item active" data-filter="all">
                        <span>Hamısı</span>
                    </div>
                    <div class="category-item" data-filter="Backend">
                        <span>Backend</span>
                    </div>
                    <div class="category-item" data-filter="C# & .NET">
                        <span>C# & .NET</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="articleModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content">
            <div class="modal-header border-0 container">
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0">
                <div class="container py-5" style="max-width: 800px;">
                    <img src="" id="full-img" class="w-100 rounded-4 mb-5 shadow-lg">
                    <h1 class="display-4 fw-bold mb-4" id="full-title"></h1>
                    <div id="full-content" class="article-body"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    // Thymeleaf vasitəsilə bazadakı bütün bloqları JavaScript-ə ötürürük
    const articlesFromDB = /*[[${blogs}]]*/ [];

    function openFullArticle(id) {
        // Siyahıdan kliklənən bloqu tapırıq
        const art = articlesFromDB.find(a => a.id == id);
        if(art) {
            document.getElementById('full-title').innerText = art.title;
            document.getElementById('full-img').src = art.imageUrl;
            // 'movzuAchiqlama' sənin tam mətnin olmalıdır
            document.getElementById('full-content').innerHTML = art.movzuAchiqlama;
            new bootstrap.Modal(document.getElementById('articleModal')).show();
        }
    }

    // Kateqoriya filtrini olduğu kimi saxlayırıq
    document.querySelectorAll('.category-item').forEach(item => {
        item.addEventListener('click', function() {
            document.querySelector('.category-item.active').classList.remove('active');
            this.classList.add('active');
            const filter = this.getAttribute('data-filter');
            document.querySelectorAll('.blog-card-wide').forEach(card => {
                const cat = card.getAttribute('data-category');
                if (filter === 'all' || cat === filter) card.classList.remove('hidden');
                else card.classList.add('hidden');
            });
        });
    });
</script>
</body>
</html>
