<!DOCTYPE html>
<html lang="az"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title th:text="${blog.title}">BrainRise | Blog</title>

    <style>
        :root { --primary-color: #0d6efd; --text-color: #2d3436; }
        .blog-header { background: white; padding-top: 50px; padding-bottom: 50px; border-bottom: 1px solid #eee; }
        .category-badge { text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; padding: 8px 20px; border-radius: 50px; margin-bottom: 20px; display: inline-block; }
        .blog-title { font-weight: 700; font-size: 2.8rem; margin-bottom: 25px; color: #1a1a1a; }

        .main-img-container { margin-top: -80px; margin-bottom: 50px; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .blog-hero { width: 100%; height: 500px; object-fit: cover; }

        /* Content Area */
        .content-card { background: white; padding: 60px; border-radius: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 100px; }
        .blog-content { font-size: 1.15rem; color: #444; line-height: 1.8; }
        .blog-content h3, .blog-content h4 { color: #1a1a1a; font-weight: 600; margin-top: 40px; margin-bottom: 20px; }

        .author-info { border-top: 1px solid #eee; padding-top: 30px; margin-top: 50px; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { transition: all 0.3s ease; text-decoration: none; font-weight: 600; display: inline-block; }
        .back-btn:hover { transform: translateX(-5px); }
    </style>
</head>
<body>

<div layout:fragment="content">
    <header class="blog-header text-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-9">
                    <span class="badge bg-primary category-badge" th:text="${blog.categoryName}">CATEGORY</span>
                    <h1 class="blog-title" th:text="${blog.title}">Blog Title</h1>

                    <div class="d-flex justify-content-center gap-4 text-muted small mb-5">
                        <span><i class="far fa-user me-2"></i> BrainRise Team</span>
                        <span><i class="far fa-calendar me-2"></i> 17 January, 2026</span>
                        <span><i class="far fa-clock me-2"></i> 8 min read</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="main-img-container">
                    <img th:src="${blog.imageUrl}" class="blog-hero" alt="Blog Image">
                </div>

                <div class="content-card">
                    <article class="blog-content" th:utext="${blog.topicDescription}">
                        Məzmun yüklənir...
                    </article>

                    <div class="author-info">
                        <div class="d-flex align-items-center">
                            <img src="https://ui-avatars.com/api/?name=BrainRise&background=0D6EFD&color=fff" class="rounded-circle me-3" width="50">
                            <div>
                                <h6 class="mb-0 fw-bold">BrainRise Mentor</h6>
                                <small class="text-muted">Senior Developer</small>
                            </div>
                        </div>
                        <div class="share-links">
                            <a href="#" class="btn btn-light btn-sm rounded-circle me-2"><i class="fab fa-linkedin-in text-primary"></i></a>
                            <a href="#" class="btn btn-light btn-sm rounded-circle"><i class="fab fa-twitter text-info"></i></a>
                        </div>
                    </div>

                    <div class="mt-5 pt-4">
                        <a th:href="@{/blog}" class="back-btn text-primary">
                            <i class="fas fa-long-arrow-alt-left me-2"></i> Back to Blog
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

</body>
</html>
