<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{admin/admin-layout}">
<head>
    <title>Bloq İdarəetməsi | Admin</title>
    <style>
        .blog-card-img { width: 80px; height: 50px; object-fit: cover; border-radius: 8px; }
        .status-published { background: #dcfce7; color: #15803d; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .status-draft { background: #fef9c3; color: #854d0e; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    </style>
</head>
<body>

<div layout:fragment="page-title">Bloqlar</div>

<div layout:fragment="content">
    <div class="glass-card mt-2 p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold mb-0">Bütün Bloqlar</h5>
            <a th:href="@{/admin/blog/create}" class="btn btn-primary rounded-pill px-4 shadow-sm">
                <i class="fas fa-plus me-2"></i> Yeni Bloq
            </a>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr class="small text-muted">
                    <th>Başlıq</th>
                    <th>Kateqoriya</th>
                    <th>Müəllif</th>
                    <th>Tarix</th>
                    <th class="text-end">Əməliyyatlar</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="blog : ${blogs}">
                    <td>
                        <div class="d-flex align-items-center">
                            <img th:src="${blog.imageUrl}" class="blog-card-img me-3" alt="blog">
                            <div>
                                <h6 class="small fw-bold mb-0" th:text="${blog.title}"></h6>
                                <small class="text-muted" th:text="${blog.subTitle}"></small>
                            </div>
                        </div>
                    </td>
                    <td th:text="${blog.categoryName != null ? blog.categoryName : '—'}"></td>
                    <td>Admin</td>
                    <td th:text="${#dates.format(blog.id != null ? blog.id : 0, 'dd MMM, yyyy')}"></td>
                    <td class="text-end">
                        <a th:href="@{'/admin/blog/edit/' + ${blog.id}}" class="btn btn-sm btn-light rounded-circle me-1" title="Redaktə et">
                            <i class="fas fa-pen text-primary"></i>
                        </a>
                        <form th:action="@{'/admin/blog/delete/' + ${blog.id}}" method="post" style="display:inline"
                              onsubmit="return confirm('Silinsin?');">
                            <button type="submit" class="btn btn-sm btn-light rounded-circle text-danger">
                                <i class="fas fa-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(blogs)}">
                    <td colspan="5" class="text-center py-5">
                        <div class="text-muted">
                            <i class="fas fa-feather-pointed fs-1 mb-3"></i>
                            <p>Hələ ki, heç bir bloq yazısı yoxdur.</p>
                        </div>
                    </td>
                </tr>

                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
