<div th:replace="~{layouts/mentor_layout :: layout(~{::section})}" xmlns:th="http://www.thymeleaf.org">
    <section>
        <style>
            .course-card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; transition: 0.3s; padding: 1.5rem; height: 100%; position: relative; }
            .course-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
            .status-badge { padding: 0.5rem 1rem; border-radius: 10px; font-weight: 700; font-size: 0.7rem; letter-spacing: 0.5px; }
            .status-pending { background: #fef3c7; color: #d97706; }
            .status-approved { background: #dcfce7; color: #166534; }
            .status-rejected { background: #fee2e2; color: #dc2626; }
            .course-icon-box { width: 45px; height: 45px; background: #f1f5f9; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--mentor-primary); font-size: 1.2rem; }
            .modal-content { border-radius: 24px !important; border: none !important; }
        </style>

        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2 class="fw-bold mb-0">Kurslarım</h2>
            <button class="btn btn-indigo px-4 py-2 shadow-sm" data-bs-toggle="modal" data-bs-target="#newCourseModal">
                <i class="fas fa-plus-circle me-2"></i> Yeni Kurs Yarat
            </button>
        </div>

        <div class="row g-4">
            <div class="col-12 text-center py-5" th:if="${#lists.isEmpty(courses)}">
                <img src="https://illustrations.popsy.co/slate/empty-folder.svg" style="width: 180px;" alt="Boş">
                <h5 class="mt-4 fw-bold">Hələ heç bir kursunuz yoxdur.</h5>
                <p class="text-muted">Yuxarıdakı düymə ilə ilk kursunuzu yarada bilərsiniz.</p>
            </div>

            <div class="col-md-6" th:each="course : ${courses}">
                <div class="course-card shadow-sm">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div class="d-flex align-items-center">
                            <div class="course-icon-box me-3">
                                <i th:class="${course.iconClass != null && course.iconClass != '' ? course.iconClass : 'fas fa-book'}"></i>
                            </div>
                            <h5 class="fw-bold mb-0" th:text="${course.name}">Kursun Adı</h5>
                        </div>

                        <div>
                            <span th:if="${course.isApproved}" class="status-badge status-approved">Təsdiqlənib</span>
                            <span th:if="${!course.isApproved && (course.rejectReason == null || course.rejectReason == '')}" class="status-badge status-pending">Gözlənilir</span>
                            <span th:if="${!course.isApproved && course.rejectReason != null && course.rejectReason != ''}" class="status-badge status-rejected">Rədd edilib</span>
                        </div>
                    </div>

                    <div th:if="${course.rejectReason != null && course.rejectReason != ''}" class="alert alert-danger py-2 px-3 mb-3 border-0 small shadow-sm" style="border-radius: 12px;">
                        <i class="fas fa-exclamation-circle me-1"></i> <strong>Səbəb:</strong> <span th:text="${course.rejectReason}">Adminin qeydi</span>
                    </div>

                    <p class="small text-muted mb-4" th:text="${course.description}">Təsvir...</p>

                    <div class="d-flex justify-content-between align-items-center border-top pt-3">
                        <div class="fw-bold text-primary" th:text="${(course.price != null ? course.price : 0) + ' AZN'}">0 AZN</div>
                        <div class="d-flex gap-2">
                            <form th:action="@{/mentor/course/delete/{id}(id=${course.id})}" method="post" onsubmit="return confirm('Bu kursu silmək istədiyinizə əminsiniz?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3"><i class="fas fa-trash-alt"></i></button>
                            </form>
                            <a th:href="@{/mentor/course/edit/{id}(id=${course.id})}" class="btn btn-sm btn-light border rounded-pill px-3">Redaktə</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="newCourseModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content shadow-lg p-4">
                    <form th:action="@{/mentor/course/create}" th:object="${course}" method="post">
                        <div class="modal-header border-0 pb-0">
                            <h5 class="fw-bold"><i class="fas fa-plus-circle text-primary me-2"></i>Yeni Kurs Yaradılması</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="row g-3">
                                <div class="col-12">
                                    <label class="small fw-bold mb-2">Kursun Adı</label>
                                    <input type="text" th:field="*{name}" class="form-control" style="border-radius: 12px;" placeholder="Məs: Java Backend" required>
                                </div>

                                <div class="col-md-6">
                                    <label class="small fw-bold mb-2">Şəkil Url</label>
                                    <input type="text" th:field="*{iconClass}" class="form-control" style="border-radius: 12px;" placeholder="Məs: fas fa-laptop-code">
                                </div>

                                <div class="col-md-6">
                                    <label class="small fw-bold mb-2">Qiymət (AZN)</label>
                                    <input type="number" step="0.01" th:field="*{price}" class="form-control" style="border-radius: 12px;" required>
                                </div>

                                <div class="col-12">
                                    <label class="small fw-bold mb-2">Video URL</label>
                                    <input type="text" th:field="*{videoUrl}" class="form-control" style="border-radius: 12px;" placeholder="Dərs linki">
                                </div>

                                <div class="col-12">
                                    <label class="small fw-bold mb-2">Təsvir</label>
                                    <textarea th:field="*{description}" class="form-control" style="border-radius: 12px;" rows="4"></textarea>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer border-0">
                            <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Bağla</button>
                            <button type="submit" class="btn btn-indigo px-4">ADMİNƏ GÖNDƏR</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</div>
