<!DOCTYPE html>
<html th:fragment="layout(content)" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrainRise | Mentor Paneli</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --mentor-primary: #6366f1; --mentor-bg: #f8fafc; --sidebar-dark: #0f172a; }
    body { background-color: var(--mentor-bg); font-family: 'Plus Jakarta Sans', sans-serif; color: #334155; margin: 0; }
    .sidebar { background: var(--sidebar-dark); min-height: 100vh; color: white; padding: 1.5rem; position: sticky; top: 0; }
    .nav-link { color: #94a3b8; padding: 0.8rem 1rem; border-radius: 12px; margin-bottom: 0.5rem; transition: 0.3s; text-decoration: none; display: block; border: none; }
    .nav-link:hover { background: rgba(99, 102, 241, 0.1); color: #818cf8; }
    .nav-link.active { background: rgba(99, 102, 241, 0.2) !important; color: #818cf8 !important; font-weight: bold; }
    .notification-indicator { width: 10px; height: 10px; background: #ef4444; border-radius: 50%; border: 2px solid var(--sidebar-dark); }
    .bg-indigo { background-color: var(--mentor-primary); color: white; }
    .btn-indigo { background-color: var(--mentor-primary); color: white; border-radius: 50px; font-weight: bold; border: none; }
  </style>
</head>
<body>

<div class="container-fluid">
  <div class="row">
    <div class="col-md-3 col-lg-2 sidebar">
      <div class="mb-5 px-2">
        <h4 class="fw-bold text-white">BRAINRISE<span class="text-primary">.</span></h4>
        <div class="badge bg-dark text-muted p-0 mt-1">MENTOR PANEL</div>
      </div>

      <div class="nav flex-column">
        <a th:href="@{/mentor/dashboard}" class="nav-link">
          <i class="fas fa-grid-2 me-2"></i> Dashboard
        </a>
        <a th:href="@{/mentor/courses}" class="nav-link">
          <i class="fas fa-book-bookmark me-2"></i> Kurslarƒ±m
        </a>
        <a th:href="@{/mentor/students}" class="nav-link d-flex justify-content-between align-items-center">
          <span><i class="fas fa-user-group me-2"></i> T…ôl…ôb…ôl…ôrim</span>
          <span class="badge bg-indigo rounded-pill" th:text="${studentCount != null ? studentCount : 0}">0</span>
        </a>
        <a th:href="@{/mentor/reviews}" class="nav-link"><i class="fas fa-star-half-stroke me-2"></i> R…ôyl…ôr</a>

        <a th:href="@{/mentor/notifications}" class="nav-link d-flex justify-content-between align-items-center">
          <span><i class="fas fa-bell me-2"></i> Bildiri≈ül…ôr</span>
          <span th:if="${unreadCount > 0}" class="badge bg-danger rounded-pill" th:text="${unreadCount}"></span>
          <div th:if="${hasNewNotifications}" class="notification-indicator"></div>
        </a>
        <hr class="border-secondary my-4">

        <a th:href="@{/}" class="nav-link"><i class="fas fa-house me-2"></i> Ana S…ôhif…ô</a>
        <a th:href="@{/mentor/profile/settings}" class="nav-link active">
          <i class="fas fa-cog me-2"></i> Profil Ayarlarƒ±
        </a>

        <hr class="border-secondary my-4">

        <form th:action="@{/logout}" method="post">
          <button type="submit" class="nav-link text-danger border-0 bg-transparent w-100 text-start">
            <i class="fas fa-arrow-right-from-bracket me-2"></i> √áƒ±xƒ±≈ü
          </button>
        </form>
      </div>
    </div>

    <div class="col-md-9 col-lg-10 p-5">
      <div th:replace="${content}"></div>
    </div>
  </div>
</div>
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
